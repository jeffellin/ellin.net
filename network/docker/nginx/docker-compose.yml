version: "3"

# More info at https://github.com/pi-hole/docker-pi-hole/ and https://docs.pi-hole.net/
services:
  pihole:
    container_name: nginx
    image: nginx:latest
    ports:
      - "80:80/tcp"
      - "443:443/tcp"
    environment:
      TZ: 'America/NewYork'
    # Volumes store your data between container upgrades
    dns:
      - '192/168.1.6'
    volumes:
            - './config:/etc/nginx:ro'      
    restart: unless-stopped
